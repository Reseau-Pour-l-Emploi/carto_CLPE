<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f1923; color: #e0e8f0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* ── Header ── */
  #header {
    background: linear-gradient(135deg, #0a2540 0%, #1a3a5c 100%);
    padding: 12px 20px;
    border-bottom: 1px solid #1e4060;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 12px rgba(0,0,0,0.5);
    flex-shrink: 0;
    gap: 16px;
    flex-wrap: wrap;
  }
  #header-title h1 { font-size: 1.05rem; font-weight: 700; color: #7ec8f4; letter-spacing: 0.3px; }
  #header-title p  { font-size: 0.68rem; color: #5a7a98; margin-top: 2px; }

  #controls { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
  .ctrl-group { display: flex; flex-direction: column; gap: 3px; }
  .ctrl-group label { font-size: 0.62rem; color: #5a7a98; text-transform: uppercase; letter-spacing: 0.6px; font-weight: 600; }
  select {
    background: #0d2035;
    color: #c8dff0;
    border: 1px solid #1e4060;
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 0.78rem;
    cursor: pointer;
    outline: none;
    min-width: 170px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  select:hover  { border-color: #4a9fd4; }
  select:focus  { border-color: #4a9fd4; box-shadow: 0 0 0 2px rgba(74,159,212,0.2); }
  .btn-reset {
    background: transparent;
    color: #7ec8f4;
    border: 1px solid #2a5a8c;
    border-radius: 6px;
    padding: 5px 14px;
    font-size: 0.78rem;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    white-space: nowrap;
  }
  .btn-reset:hover { background: #1a3a5c; border-color: #4a9fd4; }

  /* ── Map ── */
  #map { flex: 1; }

  /* ── Loading overlay ── */
  #loading {
    position: fixed; inset: 0;
    background: #0a1520;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 9999;
    transition: opacity 0.5s;
  }
  #loading.fade-out { opacity: 0; pointer-events: none; }
  #loading-logo { font-size: 2.5rem; margin-bottom: 20px; }
  #loading h2 { color: #7ec8f4; font-size: 1rem; margin-bottom: 24px; font-weight: 500; }
  #loading-bar-wrap {
    width: 280px; height: 4px;
    background: #1a3a5c;
    border-radius: 4px; overflow: hidden;
  }
  #loading-bar {
    height: 100%;
    background: linear-gradient(90deg, #1a7abf, #7ec8f4);
    width: 0%;
    border-radius: 4px;
    transition: width 0.3s ease;
  }
  #loading-status { color: #4a7a9a; font-size: 0.72rem; margin-top: 10px; }

  /* ── Tooltip CLPE ── */
  .tooltip-clpe {
    background: rgba(6, 16, 28, 0.96) !important;
    border: 1px solid #2a6090 !important;
    color: #a8d8f8 !important;
    font-size: 0.78rem !important;
    padding: 8px 13px !important;
    border-radius: 8px !important;
    box-shadow: 0 4px 18px rgba(0,0,0,0.7) !important;
    pointer-events: none !important;
    max-width: 280px !important;
    line-height: 1.5 !important;
  }
  .tooltip-clpe::before { display: none !important; }
  .tt-region  { font-size: 0.66rem; color: #ffe070; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; margin-bottom: 2px; }
  .tt-dep     { font-size: 0.72rem; color: #f0c060; margin-bottom: 4px; }
  .tt-clpe    { font-size: 0.84rem; color: #e8f4ff; font-weight: 700; border-top: 1px solid rgba(74,159,212,0.25); padding-top: 4px; margin-top: 2px; }

  /* ── Legend ── */
  #legend {
    position: absolute;
    bottom: 30px; right: 14px;
    background: rgba(6, 16, 28, 0.9);
    border: 1px solid #1e4060;
    border-radius: 9px;
    padding: 11px 15px;
    font-size: 0.72rem;
    z-index: 1000;
    min-width: 175px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }
  #legend h3 { color: #7ec8f4; font-size: 0.74rem; margin-bottom: 9px; font-weight: 700; letter-spacing: 0.3px; }
  .leg-item { display: flex; align-items: center; gap: 9px; margin-bottom: 6px; color: #90b8d0; }
  .leg-swatch { width: 26px; height: 12px; border-radius: 3px; flex-shrink: 0; }
  .leg-line   { width: 26px; flex-shrink: 0; }
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div id="loading-logo">🗺</div>
  <h2>Chargement de la carte…</h2>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  <div id="loading-status">Initialisation…</div>
</div>

<!-- Header -->
<div id="header">
  <div id="header-title">
    <h1>Comités Locaux pour l'Emploi — France</h1>
    <p>362 comités locaux · Survolez un territoire pour afficher région, département et comité local · Cliquez pour zoomer</p>
  </div>
  <div id="controls">
    <div class="ctrl-group">
      <label>Région</label>
      <select id="sel-region" onchange="zoomToSelection('region')">
        <option value="">— Toutes les régions —</option>
      </select>
    </div>
    <div class="ctrl-group">
      <label>Département</label>
      <select id="sel-dep" onchange="zoomToSelection('dep')">
        <option value="">— Tous les départements —</option>
      </select>
    </div>
    <div class="ctrl-group">
      <label>Comité Local pour l'Emploi</label>
      <select id="sel-clpe" onchange="zoomToSelection('clpe')">
        <option value="">— Tous les CLPE —</option>
      </select>
    </div>
    <button class="btn-reset" onclick="resetView()">↺ Vue d'ensemble</button>
  </div>
</div>

<!-- Map -->
<div id="map"></div>

<!-- Legend -->
<div id="legend">
  <h3>Légende</h3>
  <div class="leg-item">
    <div class="leg-swatch" style="background:linear-gradient(90deg,#1a5276,#2980b9,#1abc9c);opacity:0.8;border:1px solid rgba(30,100,160,0.5);"></div>
    Comité Local pour l'Emploi
  </div>
  <div class="leg-item">
    <div class="leg-line"><svg width="26" height="4"><line x1="0" y1="2" x2="26" y2="2" stroke="#e8c040" stroke-width="2.5"/></svg></div>
    Région
  </div>
  <div class="leg-item">
    <div class="leg-line"><svg width="26" height="4"><line x1="0" y1="2" x2="26" y2="2" stroke="#e8a030" stroke-width="1.5"/></svg></div>
    Département
  </div>
  <div class="leg-item">
    <div class="leg-line"><svg width="26" height="4"><line x1="0" y1="2" x2="26" y2="2" stroke="rgba(140,190,230,0.35)" stroke-width="1"/></svg></div>
    Commune
  </div>
</div>

<script>
// ─── Blue palette ──────────────────────────────────────────────────────────
const PALETTE = [
  '#1a5276','#1f8cbf','#117a65','#154360','#2980b9',
  '#1abc9c','#0e6251','#2471a3','#148f77','#1a6da0',
  '#0d5073','#239b56'
];
function clpeColor(idx) { return PALETTE[idx % PALETTE.length]; }

// ─── Progress bar ─────────────────────────────────────────────────────────
const bar    = document.getElementById('loading-bar');
const status = document.getElementById('loading-status');
function setProgress(pct, msg) { bar.style.width = pct + '%'; status.textContent = msg; }

// ─── Map init ─────────────────────────────────────────────────────────────
const map = L.map('map', { center: [46.5, 2.5], zoom: 6, preferCanvas: true, zoomSnap: 0.5 });

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/">CARTO</a>',
  maxZoom: 18, opacity: 0.55
}).addTo(map);

// ─── Load all data ────────────────────────────────────────────────────────
let REG_DATA, DEP_DATA, CLPE_DATA, COM_DATA;

async function loadAll() {
  setProgress(5,  'Chargement des régions…');
  REG_DATA  = await fetch('data/reg.json').then(r => r.json());
  setProgress(18, 'Chargement des départements…');
  DEP_DATA  = await fetch('data/dep.json').then(r => r.json());
  setProgress(35, 'Chargement des comités locaux…');
  CLPE_DATA = await fetch('data/clpe.json').then(r => r.json());
  setProgress(52, 'Chargement des communes…');
  COM_DATA  = await fetch('data/com.json').then(r => r.json());
  setProgress(72, 'Chargement du masque mondial…');
  await addWorldMask();
  setProgress(85, 'Construction des couches…');
  buildLayers();
  setProgress(95, 'Finalisation…');
  populateDropdowns();
  setTimeout(() => {
    setProgress(100, 'Prêt !');
    const overlay = document.getElementById('loading');
    overlay.classList.add('fade-out');
    setTimeout(() => overlay.remove(), 600);
  }, 200);
}

// ─── Masque mondial (cache tout sauf la France et ses COM) ────────────────
async function addWorldMask() {
  // Pays à NE PAS masquer : France (FRA) et ses collectivités mentionnées
  const KEEP_ISO = new Set(['FRA', 'SPM', 'BLM', 'MAF']);
  try {
    const res = await fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson');
    const world = await res.json();
    const toMask = {
      type: 'FeatureCollection',
      features: world.features.filter(f => {
        const iso = f.properties && (f.properties.ISO_A3 || f.properties.iso_a3 || '');
        return !KEEP_ISO.has(iso);
      })
    };
    L.geoJSON(toMask, {
      style: {
        fillColor: '#060e18',
        fillOpacity: 0.82,
        color: '#060e18',
        weight: 0.5
      },
      interactive: false
    }).addTo(map);
  } catch(e) {
    console.warn('Masque mondial non disponible :', e);
  }
}

// ─── Layers ───────────────────────────────────────────────────────────────
const tooltip = L.tooltip({ className: 'tooltip-clpe', permanent: false, direction: 'top', offset: [0, -10] });

function buildLayers() {
  // Communes
  const comLayer = L.geoJSON(COM_DATA, {
    renderer: L.canvas({ tolerance: 1 }),
    style: { weight: 0.2, color: 'rgba(100,160,210,0.1)', fill: false }
  }).addTo(map);

  map.on('zoomend', function() {
    const z = map.getZoom();
    const opacity = z >= 9 ? 0.28 : z >= 7 ? 0.14 : 0.06;
    comLayer.setStyle({ color: `rgba(100,160,210,${opacity})`, weight: z >= 9 ? 0.4 : 0.2 });
  });

  // CLPE
  const clpeLayer = L.geoJSON(CLPE_DATA, {
    renderer: L.canvas({ tolerance: 2 }),
    style: function(feat) {
      const c = feat.properties.color_idx || 0;
      return { weight: 0.8, color: 'rgba(20,60,110,0.5)', fillColor: clpeColor(c), fillOpacity: 0.72 };
    },
    onEachFeature: function(feat, layer) {
      const p = feat.properties;
      const ttHTML = `
        <div class="tt-region">📍 ${p.reg || ''}</div>
        <div class="tt-dep">🏛 ${p.dep || ''}</div>
        <div class="tt-clpe">🤝 ${p.CLPE}</div>
      `;
      layer.on('mouseover', function(e) {
        layer.setStyle({ weight: 2.5, color: '#7ec8f4', fillOpacity: 0.88 });
        tooltip.setLatLng(e.latlng).setContent(ttHTML).addTo(map);
      });
      layer.on('mousemove', function(e) { tooltip.setLatLng(e.latlng); });
      layer.on('mouseout', function() {
        clpeLayer.resetStyle(layer);
        map.removeLayer(tooltip);
      });
      layer.on('click', function() { zoomToBbox(feat.properties.bbox); });
    }
  }).addTo(map);

  // Départements
  L.geoJSON(DEP_DATA, { style: { weight: 1.5, color: '#e8a030', fill: false } }).addTo(map);

  // Régions
  L.geoJSON(REG_DATA, { style: { weight: 2.8, color: '#e8c040', fill: false } }).addTo(map);

  buildLabels();
}

// ─── Labels dynamiques ────────────────────────────────────────────────────
let regLabelGroup, depLabelGroup;
function buildLabels() {
  const makeIcon = (html) => L.divIcon({ className: '', html, iconAnchor: [0, 0] });

  const regMarkers = REG_DATA.features.map(feat => {
    const b = feat.properties.bbox;
    return L.marker([(b[1]+b[3])/2, (b[0]+b[2])/2], {
      icon: makeIcon(`<div style="font-size:0.88rem;color:#ffe070;text-shadow:0 0 5px #000,0 0 10px #000;font-weight:700;white-space:nowrap;pointer-events:none;">${feat.properties.nom_officiel}</div>`),
      interactive: false
    });
  });

  const depMarkers = DEP_DATA.features.map(feat => {
    const b = feat.properties.bbox;
    return L.marker([(b[1]+b[3])/2, (b[0]+b[2])/2], {
      icon: makeIcon(`<div style="font-size:0.62rem;color:#f0c060;text-shadow:0 0 4px #000,0 0 8px #000;font-weight:600;white-space:nowrap;pointer-events:none;">${feat.properties.nom_officiel}</div>`),
      interactive: false
    });
  });

  regLabelGroup = L.layerGroup(regMarkers);
  depLabelGroup = L.layerGroup(depMarkers);
  map.on('zoomend', updateLabels);
  updateLabels();
}

function updateLabels() {
  const z = map.getZoom();
  if (z <= 7)   { if (!map.hasLayer(regLabelGroup)) regLabelGroup.addTo(map); }
  else           { if (map.hasLayer(regLabelGroup))  map.removeLayer(regLabelGroup); }
  if (z >= 7.5) { if (!map.hasLayer(depLabelGroup)) depLabelGroup.addTo(map); }
  else           { if (map.hasLayer(depLabelGroup))  map.removeLayer(depLabelGroup); }
}

// ─── Dropdowns ────────────────────────────────────────────────────────────
function populateDropdowns() {
  const selReg  = document.getElementById('sel-region');
  const selDep  = document.getElementById('sel-dep');
  const selClpe = document.getElementById('sel-clpe');

  REG_DATA.features.map(f => f.properties.nom_officiel).sort()
    .forEach(name => selReg.add(new Option(name, name)));
  DEP_DATA.features.map(f => f.properties.nom_officiel).sort()
    .forEach(name => selDep.add(new Option(name, name)));
  [...new Set(CLPE_DATA.features.map(f => f.properties.CLPE))].sort()
    .forEach(name => selClpe.add(new Option(name, name)));
}

// ─── Zoom helpers ─────────────────────────────────────────────────────────
function zoomToBbox(bbox) {
  map.fitBounds([[bbox[1],bbox[0]],[bbox[3],bbox[2]]], { padding: [45,45], maxZoom: 12 });
}
function zoomToSelection(type) {
  const selReg  = document.getElementById('sel-region');
  const selDep  = document.getElementById('sel-dep');
  const selClpe = document.getElementById('sel-clpe');
  let feat;
  if (type === 'region') {
    const v = selReg.value; if (!v) return;
    selDep.value = ''; selClpe.value = '';
    feat = REG_DATA.features.find(f => f.properties.nom_officiel === v);
  } else if (type === 'dep') {
    const v = selDep.value; if (!v) return;
    selReg.value = ''; selClpe.value = '';
    feat = DEP_DATA.features.find(f => f.properties.nom_officiel === v);
  } else {
    const v = selClpe.value; if (!v) return;
    selReg.value = ''; selDep.value = '';
    feat = CLPE_DATA.features.find(f => f.properties.CLPE === v);
  }
  if (feat) zoomToBbox(feat.properties.bbox);
}
function resetView() {
  document.getElementById('sel-region').value = '';
  document.getElementById('sel-dep').value    = '';
  document.getElementById('sel-clpe').value   = '';
  map.setView([46.5, 2.5], 6);
}

// ─── Start ────────────────────────────────────────────────────────────────
loadAll().catch(err => {
  status.textContent = 'Erreur de chargement : ' + err.message;
  bar.style.background = '#c0392b';
});
</script>
</body>
</html>
