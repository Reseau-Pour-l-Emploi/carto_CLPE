<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f1923; color: #e0e8f0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* ── Header ── */
  #header {
    background: linear-gradient(135deg, #0a2540 0%, #1a3a5c 100%);
    padding: 12px 20px;
    border-bottom: 1px solid #1e4060;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 12px rgba(0,0,0,0.5);
    flex-shrink: 0;
    gap: 16px;
    flex-wrap: wrap;
  }
  #header-title h1 { font-size: 1.05rem; font-weight: 700; color: #7ec8f4; letter-spacing: 0.3px; }
  #header-title p  { font-size: 0.68rem; color: #5a7a98; margin-top: 2px; }

  #controls { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
  .ctrl-group { display: flex; flex-direction: column; gap: 3px; }
  .ctrl-group label { font-size: 0.62rem; color: #5a7a98; text-transform: uppercase; letter-spacing: 0.6px; font-weight: 600; }
  select {
    background: #0d2035;
    color: #c8dff0;
    border: 1px solid #1e4060;
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 0.78rem;
    cursor: pointer;
    outline: none;
    min-width: 170px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  select:hover  { border-color: #4a9fd4; }
  select:focus  { border-color: #4a9fd4; box-shadow: 0 0 0 2px rgba(74,159,212,0.2); }
  .btn-reset {
    background: transparent;
    color: #7ec8f4;
    border: 1px solid #2a5a8c;
    border-radius: 6px;
    padding: 5px 14px;
    font-size: 0.78rem;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    white-space: nowrap;
  }
  .btn-reset:hover { background: #1a3a5c; border-color: #4a9fd4; }

  /* ── Map ── */
  /* background-color = couleur mer CARTO dark (correspondance masque pays) */
  #map { flex: 1; background: #0c1825; }

  /* ── Loading overlay ── */
  #loading {
    position: fixed; inset: 0;
    background: #0a1520;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 9999;
    transition: opacity 0.5s;
  }
  #loading.fade-out { opacity: 0; pointer-events: none; }
  #loading-logo { font-size: 2.5rem; margin-bottom: 20px; }
  #loading h2 { color: #7ec8f4; font-size: 1rem; margin-bottom: 24px; font-weight: 500; }
  #loading-bar-wrap {
    width: 280px; height: 4px;
    background: #1a3a5c;
    border-radius: 4px; overflow: hidden;
  }
  #loading-bar {
    height: 100%;
    background: linear-gradient(90deg, #1a7abf, #7ec8f4);
    width: 0%;
    border-radius: 4px;
    transition: width 0.3s ease;
  }
  #loading-status { color: #4a7a9a; font-size: 0.72rem; margin-top: 10px; }

  /* ── Tooltip CLPE ── */
  .tooltip-clpe {
    background: rgba(6, 16, 28, 0.97) !important;
    border: 1px solid #2a6090 !important;
    font-size: 0.78rem !important;
    padding: 8px 13px !important;
    border-radius: 8px !important;
    box-shadow: 0 4px 18px rgba(0,0,0,0.7) !important;
    pointer-events: none !important;
    max-width: 300px !important;
    line-height: 1.65 !important;
  }
  .tooltip-clpe::before { display: none !important; }
  /* Couleurs forcées sur les enfants pour garantir l'affichage */
  .tooltip-clpe .tt-region { display: block; font-size: 0.66rem; color: #ffe070 !important; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; margin-bottom: 1px; }
  .tooltip-clpe .tt-dep    { display: block; font-size: 0.72rem; color: #f5b84a !important; margin-bottom: 1px; }
  .tooltip-clpe .tt-com    { display: block; font-size: 0.70rem; color: #8ecce8 !important; font-style: italic; margin-bottom: 4px; }
  .tooltip-clpe .tt-clpe   { display: block; font-size: 0.86rem; color: #e8f4ff !important; font-weight: 700; border-top: 1px solid rgba(74,159,212,0.3); padding-top: 5px; margin-top: 3px; }

  /* ── Legend ── */
  #legend {
    position: absolute;
    bottom: 30px; right: 14px;
    background: rgba(6, 16, 28, 0.9);
    border: 1px solid #1e4060;
    border-radius: 9px;
    padding: 11px 15px;
    font-size: 0.72rem;
    z-index: 1000;
    min-width: 175px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }
  #legend h3 { color: #7ec8f4; font-size: 0.74rem; margin-bottom: 9px; font-weight: 700; letter-spacing: 0.3px; }
  .leg-item { display: flex; align-items: center; gap: 9px; margin-bottom: 6px; color: #90b8d0; }
  .leg-swatch { width: 26px; height: 12px; border-radius: 3px; flex-shrink: 0; }
  .leg-line   { width: 26px; flex-shrink: 0; }
</style>

<body>

<!-- Loading -->
<div id="loading">
  <div id="loading-logo">🗺</div>
  <h2>Chargement de la carte…</h2>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  <div id="loading-status">Initialisation…</div>
</div>

<!-- Header -->
<div id="header">
  <div id="header-title">
    <h1>Comités Locaux pour l'Emploi — France</h1>
    <p>362 comités locaux · Survolez pour afficher région, département, commune et comité local · Cliquez pour zoomer</p>
  </div>
  <div id="controls">
    <div class="ctrl-group">
      <label>Région</label>
      <select id="sel-region" onchange="onRegionChange()">
        <option value="">— Toutes les régions —</option>
      </select>
    </div>
    <div class="ctrl-group">
      <label>Département</label>
      <select id="sel-dep" onchange="onDepChange()">
        <option value="">— Tous les départements —</option>
      </select>
    </div>
    <div class="ctrl-group">
      <label>Comité Local pour l'Emploi</label>
      <select id="sel-clpe" onchange="onClpeChange()">
        <option value="">— Tous les CLPE —</option>
      </select>
    </div>
    <button class="btn-reset" onclick="resetView()">↺ Vue d'ensemble</button>
  </div>
</div>

<!-- Map -->
<div id="map"></div>

<!-- Legend -->
<div id="legend">
  <h3>Légende</h3>
  <div class="leg-item">
    <div class="leg-swatch" style="background:linear-gradient(90deg,#1a5276,#2980b9,#1abc9c);opacity:0.8;border:1px solid rgba(30,100,160,0.5);"></div>
    Comité Local pour l'Emploi
  </div>
  <div class="leg-item">
    <div class="leg-line"><svg width="26" height="4"><line x1="0" y1="2" x2="26" y2="2" stroke="#e8c040" stroke-width="2.5"/></svg></div>
    Région
  </div>
  <div class="leg-item">
    <div class="leg-line"><svg width="26" height="4"><line x1="0" y1="2" x2="26" y2="2" stroke="#e8a030" stroke-width="1.5"/></svg></div>
    Département
  </div>
  <div class="leg-item">
    <div class="leg-line"><svg width="26" height="4"><line x1="0" y1="2" x2="26" y2="2" stroke="rgba(140,190,230,0.35)" stroke-width="1"/></svg></div>
    Commune
  </div>
</div>

<script>
// ─── Blue palette ──────────────────────────────────────────────────────────
const PALETTE = [
  '#1a5276','#1f8cbf','#117a65','#154360','#2980b9',
  '#1abc9c','#0e6251','#2471a3','#148f77','#1a6da0',
  '#0d5073','#239b56'
];
function clpeColor(idx) { return PALETTE[idx % PALETTE.length]; }

// ─── Progress bar ─────────────────────────────────────────────────────────
const bar    = document.getElementById('loading-bar');
const status = document.getElementById('loading-status');
function setProgress(pct, msg) { bar.style.width = pct + '%'; status.textContent = msg; }

// ─── Map init ─────────────────────────────────────────────────────────────
const map = L.map('map', { center: [46.5, 2.5], zoom: 6, preferCanvas: true, zoomSnap: 0.5 });

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/">CARTO</a>',
  maxZoom: 18, opacity: 0.55
}).addTo(map);

// ─── Data globals ─────────────────────────────────────────────────────────
let REG_DATA, DEP_DATA, CLPE_DATA, COM_DATA;

// ─── Cascading dropdown structures ───────────────────────────────────────
let allDeps = [], allClpes = [];
let regToDeps    = {};   // nom région  → [noms dep]
let depToClpes   = {};   // nom dep     → [noms CLPE]
let depToRegName = {};   // nom dep     → nom région

// ─── Commune centroids pour détection au survol ───────────────────────────
let COM_CENTROIDS = [];

function buildComCentroids() {
  COM_CENTROIDS = COM_DATA.features.map(function(feat) {
    var geom = feat.geometry;
    var ring = geom.type === 'Polygon' ? geom.coordinates[0] : geom.coordinates[0][0];
    var sx = 0, sy = 0, n = ring.length - 1;
    for (var i = 0; i < n; i++) { sx += ring[i][0]; sy += ring[i][1]; }
    return { name: feat.properties.nom_officiel, x: sx / n, y: sy / n };
  });
}

// Retourne la commune la plus proche du point (lng, lat)
function findNearestCommune(lng, lat) {
  var best = null, bestDist = Infinity;
  for (var i = 0; i < COM_CENTROIDS.length; i++) {
    var c = COM_CENTROIDS[i];
    var d = (c.x - lng) * (c.x - lng) + (c.y - lat) * (c.y - lat);
    if (d < bestDist) { bestDist = d; best = c; }
  }
  return best ? best.name : null;
}

// ─── Structures de données pour les dropdowns cascadants ──────────────────
function buildCascadingMaps() {
  // code région → nom région
  var regCodeToName = {};
  REG_DATA.features.forEach(function(f) {
    regCodeToName[f.properties.code_insee] = f.properties.nom_officiel;
  });

  // nom dep → nom région, et reg → [deps]
  DEP_DATA.features.forEach(function(f) {
    var dep = f.properties.nom_officiel;
    var regCode = f.properties.code_insee_de_la_region || '';
    var regName = regCodeToName[regCode] || '';
    depToRegName[dep] = regName;
    if (!regToDeps[regName]) regToDeps[regName] = [];
    regToDeps[regName].push(dep);
  });

  // nom dep → [noms CLPE]
  CLPE_DATA.features.forEach(function(f) {
    var dep = f.properties.dep || '';
    if (!depToClpes[dep]) depToClpes[dep] = [];
    depToClpes[dep].push(f.properties.CLPE);
  });

  // Tri alphabétique de toutes les listes
  Object.values(regToDeps).forEach(function(a) { a.sort(); });
  Object.values(depToClpes).forEach(function(a) { a.sort(); });

  allDeps  = DEP_DATA.features.map(function(f) { return f.properties.nom_officiel; }).sort();
  allClpes = [...new Set(CLPE_DATA.features.map(function(f) { return f.properties.CLPE; }))].sort();
}

// ─── Chargement de toutes les données ────────────────────────────────────
async function loadAll() {
  setProgress(5,  'Chargement des régions…');
  REG_DATA  = await fetch('data/reg.json').then(function(r) { return r.json(); });
  setProgress(18, 'Chargement des départements…');
  DEP_DATA  = await fetch('data/dep.json').then(function(r) { return r.json(); });
  setProgress(35, 'Chargement des comités locaux…');
  CLPE_DATA = await fetch('data/clpe.json').then(function(r) { return r.json(); });
  setProgress(52, 'Chargement des communes…');
  COM_DATA  = await fetch('data/com.json').then(function(r) { return r.json(); });
  setProgress(65, 'Préparation des données…');
  buildComCentroids();
  buildCascadingMaps();
  setProgress(72, 'Chargement du masque mondial…');
  await addWorldMask();
  setProgress(85, 'Construction des couches…');
  buildLayers();
  setProgress(95, 'Finalisation…');
  populateDropdowns();
  setTimeout(function() {
    setProgress(100, 'Prêt !');
    var overlay = document.getElementById('loading');
    overlay.classList.add('fade-out');
    setTimeout(function() { overlay.remove(); }, 600);
  }, 200);
}

// ─── Masque mondial ───────────────────────────────────────────────────────
// Seul FRA est conservé visible.
// SPM (Saint-Pierre-et-Miquelon), BLM (Saint-Barthélemy) et MAF (Saint-Martin)
// sont masqués au même titre que les autres pays étrangers.
async function addWorldMask() {
  var KEEP_ISO = new Set(['FRA']);
  // Couleur identique au fond CSS du #map (mer CARTO dark)
  var SEA_COLOR = '#0c1825';
  try {
    var res = await fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson');
    var world = await res.json();
    var toMask = {
      type: 'FeatureCollection',
      features: world.features.filter(function(f) {
        var iso = f.properties && (f.properties.ISO_A3 || f.properties.iso_a3 || '');
        return !KEEP_ISO.has(iso);
      })
    };
    L.geoJSON(toMask, {
      style: {
        fillColor:   SEA_COLOR,
        fillOpacity: 1.0,
        color:       SEA_COLOR,
        weight:      0
      },
      interactive: false
    }).addTo(map);
  } catch(e) {
    console.warn('Masque mondial non disponible :', e);
  }
}

// ─── Construction des couches cartographiques ─────────────────────────────
var tooltip = L.tooltip({ className: 'tooltip-clpe', permanent: false, direction: 'top', offset: [0, -10] });

function buildTooltipHTML(p, communeName) {
  var region = p.reg  || '—';
  var dep    = p.dep  || '—';
  var clpe   = p.CLPE || '—';
  var comLine = communeName
    ? '<span class="tt-com">🏘 ' + communeName + '</span>'
    : '';
  return '<span class="tt-region">📍 ' + region + '</span>' +
         '<span class="tt-dep">🏛 ' + dep + '</span>' +
         comLine +
         '<span class="tt-clpe">🤝 ' + clpe + '</span>';
}

function buildLayers() {
  // Communes (traits de contour, non interactifs)
  var comLayer = L.geoJSON(COM_DATA, {
    renderer: L.canvas({ tolerance: 1 }),
    style: { weight: 0.2, color: 'rgba(100,160,210,0.1)', fill: false }
  }).addTo(map);

  map.on('zoomend', function() {
    var z = map.getZoom();
    var opacity = z >= 9 ? 0.28 : z >= 7 ? 0.14 : 0.06;
    comLayer.setStyle({ color: 'rgba(100,160,210,' + opacity + ')', weight: z >= 9 ? 0.4 : 0.2 });
  });

  // CLPE — couche principale interactive
  var clpeLayer = L.geoJSON(CLPE_DATA, {
    renderer: L.canvas({ tolerance: 2 }),
    style: function(feat) {
      var c = feat.properties.color_idx || 0;
      return { weight: 0.8, color: 'rgba(20,60,110,0.5)', fillColor: clpeColor(c), fillOpacity: 0.72 };
    },
    onEachFeature: function(feat, layer) {
      var p = feat.properties;

      layer.on('mouseover', function(e) {
        layer.setStyle({ weight: 2.5, color: '#7ec8f4', fillOpacity: 0.88 });
        var com = findNearestCommune(e.latlng.lng, e.latlng.lat);
        tooltip.setLatLng(e.latlng).setContent(buildTooltipHTML(p, com)).addTo(map);
      });

      layer.on('mousemove', function(e) {
        var com = findNearestCommune(e.latlng.lng, e.latlng.lat);
        tooltip.setLatLng(e.latlng).setContent(buildTooltipHTML(p, com));
      });

      layer.on('mouseout', function() {
        clpeLayer.resetStyle(layer);
        map.removeLayer(tooltip);
      });

      layer.on('click', function() { zoomToBbox(feat.properties.bbox); });
    }
  }).addTo(map);

  // Départements
  L.geoJSON(DEP_DATA, { style: { weight: 1.5, color: '#e8a030', fill: false } }).addTo(map);

  // Régions
  L.geoJSON(REG_DATA, { style: { weight: 2.8, color: '#e8c040', fill: false } }).addTo(map);

  buildLabels();
}

// ─── Étiquettes dynamiques zoom-dépendantes ───────────────────────────────
var regLabelGroup, depLabelGroup;
function buildLabels() {
  function makeIcon(html) { return L.divIcon({ className: '', html: html, iconAnchor: [0, 0] }); }

  var regMarkers = REG_DATA.features.map(function(feat) {
    var b = feat.properties.bbox;
    return L.marker([(b[1]+b[3])/2, (b[0]+b[2])/2], {
      icon: makeIcon('<div style="font-size:0.88rem;color:#ffe070;text-shadow:0 0 5px #000,0 0 10px #000;font-weight:700;white-space:nowrap;pointer-events:none;">' + feat.properties.nom_officiel + '</div>'),
      interactive: false
    });
  });

  var depMarkers = DEP_DATA.features.map(function(feat) {
    var b = feat.properties.bbox;
    return L.marker([(b[1]+b[3])/2, (b[0]+b[2])/2], {
      icon: makeIcon('<div style="font-size:0.62rem;color:#f0c060;text-shadow:0 0 4px #000,0 0 8px #000;font-weight:600;white-space:nowrap;pointer-events:none;">' + feat.properties.nom_officiel + '</div>'),
      interactive: false
    });
  });

  regLabelGroup = L.layerGroup(regMarkers);
  depLabelGroup = L.layerGroup(depMarkers);
  map.on('zoomend', updateLabels);
  updateLabels();
}

function updateLabels() {
  var z = map.getZoom();
  if (z <= 7)   { if (!map.hasLayer(regLabelGroup)) regLabelGroup.addTo(map); }
  else           { if (map.hasLayer(regLabelGroup))  map.removeLayer(regLabelGroup); }
  if (z >= 7.5) { if (!map.hasLayer(depLabelGroup)) depLabelGroup.addTo(map); }
  else           { if (map.hasLayer(depLabelGroup))  map.removeLayer(depLabelGroup); }
}

// ─── Remplissage initial des listes ──────────────────────────────────────
function populateDropdowns() {
  var selReg  = document.getElementById('sel-region');
  var selDep  = document.getElementById('sel-dep');
  var selClpe = document.getElementById('sel-clpe');

  REG_DATA.features.map(function(f) { return f.properties.nom_officiel; }).sort()
    .forEach(function(name) { selReg.add(new Option(name, name)); });

  allDeps.forEach(function(name)  { selDep.add(new Option(name, name)); });
  allClpes.forEach(function(name) { selClpe.add(new Option(name, name)); });
}

// ─── Mise à jour cascadée des listes ─────────────────────────────────────
function repopulateDeps(regName) {
  var sel   = document.getElementById('sel-dep');
  var saved = sel.value;
  sel.innerHTML = '<option value="">— Tous les départements —</option>';
  var list = regName ? (regToDeps[regName] || []) : allDeps;
  list.forEach(function(name) { sel.add(new Option(name, name)); });
  if (list.indexOf(saved) !== -1) sel.value = saved;
}

function repopulateClpes(regName, depName) {
  var sel   = document.getElementById('sel-clpe');
  var saved = sel.value;
  sel.innerHTML = '<option value="">— Tous les CLPE —</option>';
  var list;
  if (depName) {
    list = (depToClpes[depName] || []).slice();
  } else if (regName) {
    var seen = {};
    list = [];
    CLPE_DATA.features.forEach(function(f) {
      if (f.properties.reg === regName && !seen[f.properties.CLPE]) {
        seen[f.properties.CLPE] = true;
        list.push(f.properties.CLPE);
      }
    });
    list.sort();
  } else {
    list = allClpes;
  }
  list.forEach(function(name) { sel.add(new Option(name, name)); });
  if (list.indexOf(saved) !== -1) sel.value = saved;
}

// ─── Gestionnaires de changement des listes ───────────────────────────────
function onRegionChange() {
  var regName = document.getElementById('sel-region').value;
  document.getElementById('sel-dep').value  = '';
  document.getElementById('sel-clpe').value = '';
  repopulateDeps(regName);
  repopulateClpes(regName, '');
  if (!regName) { map.setView([46.5, 2.5], 6); return; }
  var feat = REG_DATA.features.find(function(f) { return f.properties.nom_officiel === regName; });
  if (feat) zoomToBbox(feat.properties.bbox);
}

function onDepChange() {
  var regName = document.getElementById('sel-region').value;
  var depName = document.getElementById('sel-dep').value;
  document.getElementById('sel-clpe').value = '';
  repopulateClpes(regName, depName);
  if (!depName) {
    if (regName) {
      var feat = REG_DATA.features.find(function(f) { return f.properties.nom_officiel === regName; });
      if (feat) zoomToBbox(feat.properties.bbox);
    }
    return;
  }
  var feat = DEP_DATA.features.find(function(f) { return f.properties.nom_officiel === depName; });
  if (feat) zoomToBbox(feat.properties.bbox);
}

function onClpeChange() {
  var clpeName = document.getElementById('sel-clpe').value;
  if (!clpeName) return;
  var feat = CLPE_DATA.features.find(function(f) { return f.properties.CLPE === clpeName; });
  if (feat) zoomToBbox(feat.properties.bbox);
}

// ─── Helpers de zoom ──────────────────────────────────────────────────────
function zoomToBbox(bbox) {
  map.fitBounds([[bbox[1],bbox[0]],[bbox[3],bbox[2]]], { padding: [45,45], maxZoom: 12 });
}

function resetView() {
  document.getElementById('sel-region').value = '';
  document.getElementById('sel-dep').value    = '';
  document.getElementById('sel-clpe').value   = '';
  repopulateDeps('');
  repopulateClpes('', '');
  map.setView([46.5, 2.5], 6);
}

// ─── Démarrage ────────────────────────────────────────────────────────────
loadAll().catch(function(err) {
  status.textContent = 'Erreur de chargement : ' + err.message;
  bar.style.background = '#c0392b';
});
</script>
