<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Carte des Comités Locaux pour l’Emploi</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body {
    margin: 0;
    display: flex;
    height: 100vh;
    font-family: Arial, sans-serif;
}

#sidebar {
    width: 260px;
    padding: 15px;
    background: #f5f5f5;
    border-right: 1px solid #ccc;
}

#map {
    flex: 1;
}

</style>
</head>

<body>

<div id="sidebar">
    <h2>Comités Locaux pour l’Emploi</h2>
    <p>Survolez un CLPE pour afficher son nom.</p>
</div>

<div id="map"></div>

<script>
// ------------------------------------------------------------
// 1. Carte Leaflet
// ------------------------------------------------------------
const map = L.map('map').setView([46.6, 2.5], 6);

// ------------------------------------------------------------
// 2. Fond IGN WMTS (DOM déjà intégrés)
// ------------------------------------------------------------
L.tileLayer.wmts("https://data.geopf.fr/wmts", {
    layer: "GEOGRAPHICALGRIDSYSTEMS.PLANIGNV2",
    tilematrixSet: "PM",
    format: "image/png",
    style: "normal",
    attribution: "© IGN - GeoPlateforme"
}).addTo(map);

// ------------------------------------------------------------
// 3. Chargement du CSV
// ------------------------------------------------------------
let csvData = null;

Papa.parse("communes_clpe.csv", {
    download: true,
    header: true,
    complete: function(results) {
        csvData = results.data;
        loadCommunes();
    }
});

// ------------------------------------------------------------
// 4. Chargement des communes Admin Express (nécessaire uniquement pour géométrie)
// ------------------------------------------------------------
async function loadCommunes() {
    const communes = await fetch(
        "https://data.geopf.fr/annexes/geojson/adminexpress/communes.geojson"
    ).then(r => r.json());

    aggregateCLPE(communes);
}

// ------------------------------------------------------------
// 5. Fusion des communes par CLPE
// ------------------------------------------------------------
function aggregateCLPE(communesGeo) {
    const mapCLPE = {};

    csvData.forEach(row => {
        const code = row.INSEE_COM;
        const clpe = row.CLPE;

        if (!mapCLPE[clpe]) mapCLPE[clpe] = [];

        const match = communesGeo.features.find(
            f => f.properties.insee_com === code
        );

        if (match) mapCLPE[clpe].push(match);
    });

    drawCLPE(mapCLPE);
}

// ------------------------------------------------------------
// 6. Coloration des CLPE
// ------------------------------------------------------------
function generateBluePalette(n) {
    const colors = [];
    for (let i = 0; i < n; i++) {
        const hue = 210;
        const sat = 40 + (i * 40 / n);
        const light = 40 + (i * 40 / n);
        colors.push(`hsl(${hue}, ${sat}%, ${light}%)`);
    }
    return colors;
}

// ------------------------------------------------------------
// 7. Affichage des CLPE
// ------------------------------------------------------------
function drawCLPE(mapCLPE) {
    const clpeNames = Object.keys(mapCLPE);
    const colors = generateBluePalette(clpeNames.length);

    clpeNames.forEach((clpe, i) => {
        const features = mapCLPE[clpe];

        const merged = {
            type: "Feature",
            properties: { CLPE: clpe },
            geometry: {
                type: "MultiPolygon",
                coordinates: features.flatMap(f =>
                    f.geometry.type === "Polygon"
                        ? [f.geometry.coordinates]
                        : f.geometry.coordinates
                )
            }
        };

        L.geoJSON(merged, {
            style: {
                color: "#003366",
                weight: 1,
                fillColor: colors[i],
                fillOpacity: 0.55
            },
            onEachFeature: (feat, layer) => {
                layer.bindTooltip(feat.properties.CLPE, { sticky: true });
            }
        }).addTo(map);
    });
}
</script>

</body>
</html>
