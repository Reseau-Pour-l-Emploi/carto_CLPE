<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carte des Comités Locaux pour l'Emploi — France Travail</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet" />

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />

  <style>
    /* ── Reset & Base ────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ft-navy:    #003189;
      --ft-blue:    #0e4da4;
      --ft-mid:     #2166b8;
      --ft-sky:     #5094d4;
      --ft-pale:    #a8cbee;
      --ft-lighter: #d4e8f8;
      --ft-bg:      #f0f4fb;
      --ft-text:    #0b1f3e;
      --ft-muted:   #4a6080;
      --ft-border:  #bdd0e8;
      --ui-white:   #ffffff;
      --header-h:   56px;
      --font:       'Barlow', system-ui, sans-serif;
      --font-cond:  'Barlow Condensed', 'Barlow', sans-serif;
      --shadow-sm:  0 2px 8px rgba(0,31,80,.12);
      --shadow-md:  0 4px 20px rgba(0,31,80,.18);
    }

    html, body { height: 100%; font-family: var(--font); background: var(--ft-bg); color: var(--ft-text); }

    /* ── Layout ──────────────────────────────────────────────────── */
    #app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ── Header ──────────────────────────────────────────────────── */
    #header {
      height: var(--header-h);
      background: var(--ft-navy);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(0,0,0,.35);
      z-index: 1000;
    }

    .header-logo {
      width: 36px; height: 36px;
      background: var(--ui-white);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .header-logo svg { width: 24px; height: 24px; }

    .header-title {
      font-family: var(--font-cond);
      font-size: 18px;
      font-weight: 700;
      color: var(--ui-white);
      letter-spacing: .3px;
      line-height: 1.15;
    }
    .header-subtitle {
      font-size: 11px;
      font-weight: 400;
      color: rgba(255,255,255,.6);
      letter-spacing: .5px;
      text-transform: uppercase;
    }

    .header-sep { flex: 1; }

    #header-stats {
      display: flex; gap: 20px; align-items: center;
    }
    .stat-chip {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      color: rgba(255,255,255,.9);
      font-weight: 600;
      font-family: var(--font-cond);
      letter-spacing: .3px;
      transition: opacity .3s;
    }
    .stat-chip.hidden { opacity: 0; pointer-events: none; }

    /* ── Map container ───────────────────────────────────────────── */
    #map-wrap { flex: 1; position: relative; overflow: hidden; }
    #map      { position: absolute; inset: 0; }

    /* ── Loading overlay ─────────────────────────────────────────── */
    #loading-overlay {
      position: absolute; inset: 0; z-index: 9000;
      background: rgba(240,244,251,.94);
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(3px);
      transition: opacity .4s;
    }
    #loading-overlay.hidden { opacity: 0; pointer-events: none; }

    .loading-box {
      background: var(--ui-white);
      border-radius: 14px;
      padding: 36px 44px;
      box-shadow: var(--shadow-md);
      text-align: center;
      max-width: 380px;
      width: 90%;
    }
    .loading-box .brand {
      font-family: var(--font-cond);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--ft-navy);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .loading-box .brand::before,
    .loading-box .brand::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--ft-border);
    }

    .spinner-ring {
      width: 52px; height: 52px;
      border: 4px solid var(--ft-lighter);
      border-top-color: var(--ft-mid);
      border-right-color: var(--ft-sky);
      border-radius: 50%;
      animation: spin .9s cubic-bezier(.4,0,.2,1) infinite;
      margin: 0 auto 18px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #loading-step {
      font-size: 14px;
      color: var(--ft-muted);
      font-weight: 400;
      min-height: 20px;
      transition: opacity .2s;
    }
    .loading-box .progress-dots {
      display: flex; justify-content: center; gap: 6px; margin-top: 16px;
    }
    .progress-dots span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--ft-pale);
      animation: pulse 1.4s ease-in-out infinite;
    }
    .progress-dots span:nth-child(2) { animation-delay: .2s; }
    .progress-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes pulse { 0%,80%,100%{transform:scale(.7);opacity:.4} 40%{transform:scale(1);opacity:1} }

    .loading-box.is-error .spinner-ring { display: none; }
    .loading-box.is-error .progress-dots { display: none; }
    .error-icon { font-size: 42px; margin-bottom: 12px; }
    .error-msg  { font-size: 14px; color: #c0392b; font-weight: 600; margin-bottom: 8px; }
    .error-hint { font-size: 12px; color: var(--ft-muted); line-height: 1.5; }
    .retry-btn {
      margin-top: 16px;
      background: var(--ft-mid);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .retry-btn:hover { background: var(--ft-navy); }

    /* ── Info panel (hover CLPE) ─────────────────────────────────── */
    #info-panel {
      position: absolute;
      bottom: 28px; left: 16px;
      z-index: 800;
      background: var(--ui-white);
      border-radius: 10px;
      box-shadow: var(--shadow-md);
      padding: 14px 18px;
      min-width: 220px; max-width: 320px;
      border-left: 4px solid var(--ft-mid);
      transform: translateY(8px);
      opacity: 0;
      transition: opacity .25s, transform .25s;
      pointer-events: none;
    }
    #info-panel.visible { opacity: 1; transform: translateY(0); }

    .info-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--ft-muted);
      margin-bottom: 6px;
    }
    .info-name {
      font-family: var(--font-cond);
      font-size: 16px;
      font-weight: 700;
      color: var(--ft-navy);
      line-height: 1.25;
    }
    .info-count {
      font-size: 12px;
      color: var(--ft-muted);
      margin-top: 4px;
    }
    .info-swatch {
      display: inline-block;
      width: 12px; height: 12px;
      border-radius: 3px;
      margin-right: 5px;
      vertical-align: middle;
    }

    /* ── Leaflet label divIcons ──────────────────────────────────── */
    .lbl-region {
      pointer-events: none;
      text-align: center;
      transform: translate(-50%, -50%);
    }
    .lbl-region span {
      display: inline-block;
      font-family: var(--font-cond);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--ft-navy);
      white-space: nowrap;
      text-shadow:
        0 0 4px #fff, 0 0 4px #fff, 0 0 4px #fff,
        1px 1px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff;
    }

    .lbl-dep {
      pointer-events: none;
      text-align: center;
      transform: translate(-50%, -50%);
    }
    .lbl-dep span {
      display: inline-block;
      font-family: var(--font-cond);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: .5px;
      color: #2a4d75;
      white-space: nowrap;
      text-shadow:
        0 0 3px rgba(255,255,255,.9), 0 0 3px rgba(255,255,255,.9),
        0 0 3px rgba(255,255,255,.9);
    }

    /* ── Custom Leaflet Tooltip ──────────────────────────────────── */
    .leaflet-tooltip.clpe-tip {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      padding: 0 !important;
    }
    .clpe-tip-inner {
      padding: 6px 11px;
      border-radius: 6px;
      font-family: var(--font-cond);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
      box-shadow: var(--shadow-sm);
      border: 1px solid rgba(0,0,0,.1);
      letter-spacing: .2px;
    }

    /* ── Attribution tweak ───────────────────────────────────────── */
    .leaflet-control-attribution {
      font-size: 10px !important;
      background: rgba(255,255,255,.75) !important;
    }

    /* ── Zoom control ────────────────────────────────────────────── */
    .leaflet-control-zoom a {
      font-family: var(--font-cond) !important;
      font-weight: 700 !important;
      color: var(--ft-navy) !important;
    }

    /* ── Legend ──────────────────────────────────────────────────── */
    #legend {
      position: absolute;
      top: 16px; right: 16px;
      z-index: 800;
      background: var(--ui-white);
      border-radius: 10px;
      box-shadow: var(--shadow-md);
      padding: 12px 16px;
      font-size: 12px;
      color: var(--ft-text);
      min-width: 160px;
    }
    .legend-title {
      font-family: var(--font-cond);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--ft-muted);
      margin-bottom: 10px;
    }
    .legend-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
    }
    .legend-line {
      width: 24px; height: 3px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .legend-dash {
      width: 24px; height: 2px;
      border-radius: 1px;
      flex-shrink: 0;
      background: repeating-linear-gradient(to right, #5094d4 0 4px, transparent 4px 7px);
    }
  </style>

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script>
'use strict';

/* ════════════════════════════════════════════════════════════════════
   CONFIGURATION
   ════════════════════════════════════════════════════════════════════ */

const CFG = {
  CSV_PATH:  'communes_clpe.csv',
  TOPO_PATH: 'topo_communes.json',
  DEP_PATH:  'departements.geojson',
  REG_PATH:  'regions.geojson',

  // Centre et zoom initial (métropole France)
  MAP_CENTER: [46.5, 2.3],
  MAP_ZOOM:   6,

  // Opacité des polygones CLPE
  FILL_OPACITY:         0.62,
  FILL_OPACITY_HOVER:   0.82,

  // Palette de bleus pour le coloriage (8 couleurs → évite les conflits de carte planaire)
  BLUE_PALETTE: [
    '#d4e8f9',  // 0 – très clair
    '#a2cdee',  // 1 – clair
    '#6aa8e3',  // 2 – ciel
    '#3d85cc',  // 3 – moyen
    '#1f65ad',  // 4 – bleu France Travail
    '#0d4a8f',  // 5 – foncé
    '#4d96d6',  // 6 – variante ciel
    '#215b9e',  // 7 – variante foncé
  ],

  // Niveaux de zoom pour afficher les labels
  ZOOM_SHOW_REG: 5,
  ZOOM_SHOW_DEP: 7,
};

/* ════════════════════════════════════════════════════════════════════
   ÉTAT GLOBAL
   ════════════════════════════════════════════════════════════════════ */

let map;
let clpeGeoLayer   = null;
let labelMarkers   = { reg: [], dep: [] };
let activeLayer    = null;

/* ════════════════════════════════════════════════════════════════════
   UTILITAIRES UI
   ════════════════════════════════════════════════════════════════════ */

function setLoadingStep(msg) {
  const el = document.getElementById('loading-step');
  if (el) el.textContent = msg;
}

function hideLoading() {
  const el = document.getElementById('loading-overlay');
  if (el) { el.classList.add('hidden'); }
}

function showError(title, hint) {
  const box = document.getElementById('loading-box');
  if (!box) return;
  box.classList.add('is-error');
  box.innerHTML = `
    <div class="brand">France Travail</div>
    <div class="error-icon">⚠️</div>
    <div class="error-msg">${title}</div>
    <div class="error-hint">${hint}</div>
    <button class="retry-btn" onclick="location.reload()">Réessayer</button>
  `;
}

function updateStats(nbClpe, nbCom) {
  const c1 = document.getElementById('chip-clpe');
  const c2 = document.getElementById('chip-com');
  if (c1) { c1.textContent = `${nbClpe} CLPE`; c1.classList.remove('hidden'); }
  if (c2) { c2.textContent = `${nbCom.toLocaleString('fr-FR')} communes`; c2.classList.remove('hidden'); }
}

function showInfoPanel(name, count, color) {
  const panel = document.getElementById('info-panel');
  const nameEl = document.getElementById('info-name');
  const cntEl  = document.getElementById('info-count');
  if (!panel) return;
  panel.style.borderLeftColor = color || 'var(--ft-mid)';
  nameEl.textContent = name;
  cntEl.innerHTML    = `<span class="info-swatch" style="background:${color||'#2166b8'}"></span>${count} commune${count>1?'s':''}`;
  panel.classList.add('visible');
}

function hideInfoPanel() {
  const panel = document.getElementById('info-panel');
  if (panel) panel.classList.remove('visible');
}

/* ════════════════════════════════════════════════════════════════════
   PARSING CSV
   ════════════════════════════════════════════════════════════════════ */

/**
 * Parse le CSV et retourne Map<INSEE_COM → CLPE>.
 * Normalise les codes INSEE à 5 caractères.
 */
function parseCSV(text) {
  const result = Papa.parse(text, { header: true, skipEmptyLines: true });
  const map = new Map();
  for (const row of result.data) {
    const inseeRaw = (row['INSEE_COM'] || row['insee_com'] || '').trim();
    const clpe     = (row['CLPE']      || row['clpe']      || '').trim();
    if (!inseeRaw || !clpe) continue;
    const insee = inseeRaw.padStart(5, '0');
    map.set(insee, clpe);
  }
  return map;
}

/* ════════════════════════════════════════════════════════════════════
   CONSTRUCTION DES POLYGONES CLPE (topojson.merge)
   ════════════════════════════════════════════════════════════════════ */

/**
 * Regroupe les géométries du TopoJSON par CLPE, fusionne avec
 * topojson.merge et retourne la liste des Features GeoJSON.
 */
function buildClpeFeatures(topo, csvMap) {
  // Accès à la couche (le nom peut varier légèrement selon la version du script Python)
  const objectKey = Object.keys(topo.objects)[0];
  const communeGeoms = topo.objects[objectKey].geometries;

  // Groupe : clpeName → [geometry objects from topology]
  const clpeToGeoms = new Map();
  let coveredCount = 0;

  for (const geom of communeGeoms) {
    if (!geom || !geom.properties) continue;
    const insee = String(geom.properties.INSEE_COM || geom.properties.insee_com || '').padStart(5, '0');
    const clpe  = csvMap.get(insee);
    if (!clpe) continue;
    coveredCount++;
    if (!clpeToGeoms.has(clpe)) clpeToGeoms.set(clpe, []);
    clpeToGeoms.get(clpe).push(geom);
  }

  // Communes sans CLPE
  const orphans = communeGeoms.length - coveredCount;
  if (orphans > 0) console.warn(`⚠ ${orphans} commune(s) sans CLPE dans le CSV.`);

  // Fusionne par CLPE
  const features = [];
  for (const [clpeName, geoms] of clpeToGeoms) {
    // Filtre les géométries nulles
    const valid = geoms.filter(g => g.type && g.type !== 'Point');
    if (!valid.length) continue;
    let merged;
    try {
      merged = topojson.merge(topo, valid);
    } catch (err) {
      console.warn(`topojson.merge échoué pour "${clpeName}":`, err);
      continue;
    }
    if (!merged) continue;
    features.push({
      type: 'Feature',
      geometry: merged,
      properties: { CLPE: clpeName, count: valid.length },
    });
  }

  return { features, objectKey, communeGeoms };
}

/* ════════════════════════════════════════════════════════════════════
   ADJACENCE VIA LES ARCS TOPOLOGIQUES
   ════════════════════════════════════════════════════════════════════ */

/**
 * Récupère tous les indices d'arcs (valeur absolue) d'une géométrie.
 * TopoJSON: arc_index < 0 → arc inversé, index réel = ~arc_index.
 */
function getAllArcIndices(geomObj) {
  const indices = new Set();
  function walk(node) {
    if (!node || !Array.isArray(node)) return;
    // Si le premier élément est un nombre : c'est une bague d'arcs
    if (node.length > 0 && typeof node[0] === 'number') {
      for (const idx of node) indices.add(idx < 0 ? ~idx : idx);
    } else {
      for (const child of node) walk(child);
    }
  }
  if (geomObj.arcs) walk(geomObj.arcs);
  return indices;
}

/**
 * Construit le graphe d'adjacence entre CLPE en s'appuyant sur
 * les arcs partagés de la topologie (O(n) en nombre d'arcs).
 * Retourne Map<clpeName → Set<clpeName>>.
 */
function buildAdjacency(topo, csvMap) {
  const objectKey = Object.keys(topo.objects)[0];
  const communeGeoms = topo.objects[objectKey].geometries;

  // arcIdx → liste des codes INSEE qui l'utilisent
  const arcToInsee = new Map();

  for (const geom of communeGeoms) {
    if (!geom || !geom.properties) continue;
    const insee = String(geom.properties.INSEE_COM || '').padStart(5, '0');
    if (!csvMap.has(insee)) continue;
    for (const arcIdx of getAllArcIndices(geom)) {
      if (!arcToInsee.has(arcIdx)) arcToInsee.set(arcIdx, []);
      arcToInsee.get(arcIdx).push(insee);
    }
  }

  // Adjacence CLPE depuis les arcs partagés
  const adj = new Map();
  for (const insees of arcToInsee.values()) {
    if (insees.length < 2) continue;
    for (let i = 0; i < insees.length; i++) {
      for (let j = i + 1; j < insees.length; j++) {
        const c1 = csvMap.get(insees[i]);
        const c2 = csvMap.get(insees[j]);
        if (!c1 || !c2 || c1 === c2) continue;
        if (!adj.has(c1)) adj.set(c1, new Set());
        if (!adj.has(c2)) adj.set(c2, new Set());
        adj.get(c1).add(c2);
        adj.get(c2).add(c1);
      }
    }
  }
  return adj;
}

/* ════════════════════════════════════════════════════════════════════
   COLORIAGE DE GRAPHE (glouton)
   ════════════════════════════════════════════════════════════════════ */

/**
 * Algorithme glouton de coloriage.
 * Ordre décroissant par degré (heuristique de Welsh–Powell).
 * Retourne objet { clpeName → couleur_hex }.
 */
function graphColor(clpeNames, adj, palette) {
  const sorted = [...clpeNames].sort(
    (a, b) => (adj.get(b)?.size || 0) - (adj.get(a)?.size || 0)
  );
  const coloring = {};
  for (const name of sorted) {
    const usedByNeighbors = new Set(
      [...(adj.get(name) || [])].map(n => coloring[n]).filter(Boolean)
    );
    coloring[name] = palette.find(c => !usedByNeighbors.has(c)) ?? palette[0];
  }
  return coloring;
}

/* ════════════════════════════════════════════════════════════════════
   UTILITAIRES GÉOMÉTRIE
   ════════════════════════════════════════════════════════════════════ */

/**
 * Luminance relative (WCAG 2.1) → true si fond clair.
 */
function isLightColor(hex) {
  const r = parseInt(hex.slice(1,3), 16) / 255;
  const g = parseInt(hex.slice(3,5), 16) / 255;
  const b = parseInt(hex.slice(5,7), 16) / 255;
  const toLinear = c => c <= .03928 ? c / 12.92 : Math.pow((c+.055)/1.055, 2.4);
  const lum = .2126*toLinear(r) + .7152*toLinear(g) + .0722*toLinear(b);
  return lum > .35;
}

/**
 * Calcule le centroïde approximatif (anneau extérieur du plus grand polygone).
 */
function featureCentroid(feature) {
  const geom = feature.geometry;
  if (!geom) return null;

  function ringBBox(ring) {
    let x0=Infinity, x1=-Infinity, y0=Infinity, y1=-Infinity;
    for (const [x, y] of ring) { x0=Math.min(x0,x); x1=Math.max(x1,x); y0=Math.min(y0,y); y1=Math.max(y1,y); }
    return { area: (x1-x0)*(y1-y0), cx:(x0+x1)/2, cy:(y0+y1)/2 };
  }

  let best = null;
  const polys = geom.type === 'Polygon'      ? [geom.coordinates]
              : geom.type === 'MultiPolygon' ?  geom.coordinates
              : null;
  if (!polys) return null;

  for (const poly of polys) {
    const b = ringBBox(poly[0]);
    if (!best || b.area > best.area) best = b;
  }
  return best ? L.latLng(best.cy, best.cx) : null;
}

/* ════════════════════════════════════════════════════════════════════
   RENDU — CLPE
   ════════════════════════════════════════════════════════════════════ */

function renderClpe(features, coloring) {
  const geojson = { type: 'FeatureCollection', features };

  clpeGeoLayer = L.geoJSON(geojson, {
    pane: 'paneClpe',
    style: f => {
      const fill = coloring[f.properties.CLPE] || CFG.BLUE_PALETTE[3];
      return {
        fillColor:   fill,
        fillOpacity: CFG.FILL_OPACITY,
        color:       'rgba(255,255,255,.7)',
        weight:      1.2,
        opacity:     .9,
      };
    },
    onEachFeature: (feature, layer) => {
      const clpe  = feature.properties.CLPE;
      const count = feature.properties.count;
      const fill  = coloring[clpe] || CFG.BLUE_PALETTE[3];
      const fg    = isLightColor(fill) ? '#0b1f3e' : '#ffffff';

      layer.bindTooltip(
        `<div class="clpe-tip-inner" style="background:${fill};color:${fg}">${clpe}</div>`,
        { sticky: true, direction: 'top', offset: [0, -6], className: 'clpe-tip' }
      );

      layer.on('mouseover', function () {
        if (activeLayer && activeLayer !== layer) {
          clpeGeoLayer.resetStyle(activeLayer);
        }
        activeLayer = layer;
        layer.setStyle({
          fillOpacity: CFG.FILL_OPACITY_HOVER,
          color: 'rgba(255,255,255,1)',
          weight: 2.2,
        });
        layer.bringToFront();
        showInfoPanel(clpe, count, fill);
      });

      layer.on('mouseout', function () {
        clpeGeoLayer.resetStyle(layer);
        activeLayer = null;
        hideInfoPanel();
      });
    },
  }).addTo(map);
}

/* ════════════════════════════════════════════════════════════════════
   RENDU — COMMUNES (mesh topologique)
   ════════════════════════════════════════════════════════════════════ */

function renderCommuneMesh(topo) {
  const objectKey  = Object.keys(topo.objects)[0];
  // Uniquement les arcs intérieurs (partagés entre 2 communes)
  const mesh = topojson.mesh(topo, topo.objects[objectKey], (a, b) => a !== b);
  L.geoJSON(mesh, {
    pane: 'paneCommune',
    style: {
      color:       '#8ab5d8',
      weight:      0.4,
      opacity:     0.55,
      fill:        false,
      interactive: false,
    },
    interactive: false,
  }).addTo(map);
}

/* ════════════════════════════════════════════════════════════════════
   RENDU — DÉPARTEMENTS
   ════════════════════════════════════════════════════════════════════ */

function renderDepartements(depsGeo) {
  L.geoJSON(depsGeo, {
    pane: 'paneDep',
    style: {
      color:       '#1853a0',
      weight:      1.6,
      opacity:     .85,
      fill:        false,
      interactive: false,
    },
    interactive: false,
  }).addTo(map);

  // Labels
  for (const f of (depsGeo.features || [])) {
    const latlng = featureCentroid(f);
    if (!latlng) continue;
    const nom = (f.properties.NOM || f.properties.nom || '').trim();
    if (!nom) continue;
    const m = L.marker(latlng, {
      icon: L.divIcon({
        className: 'lbl-dep',
        html: `<span>${nom}</span>`,
        iconSize: null, iconAnchor: [0, 0],
      }),
      pane: 'paneLabel',
      interactive: false,
    });
    labelMarkers.dep.push(m);
  }
  updateLabelVisibility();
}

/* ════════════════════════════════════════════════════════════════════
   RENDU — RÉGIONS
   ════════════════════════════════════════════════════════════════════ */

function renderRegions(regsGeo) {
  L.geoJSON(regsGeo, {
    pane: 'paneReg',
    style: {
      color:   '#002b70',
      weight:  2.6,
      opacity: .95,
      fill:    false,
      interactive: false,
    },
    interactive: false,
  }).addTo(map);

  // Labels régions
  for (const f of (regsGeo.features || [])) {
    const latlng = featureCentroid(f);
    if (!latlng) continue;
    const nom = (f.properties.NOM || f.properties.nom || '').trim();
    if (!nom) continue;
    const m = L.marker(latlng, {
      icon: L.divIcon({
        className: 'lbl-region',
        html: `<span>${nom}</span>`,
        iconSize: null, iconAnchor: [0, 0],
      }),
      pane: 'paneLabel',
      interactive: false,
    });
    labelMarkers.reg.push(m);
  }
  updateLabelVisibility();
}

/* ════════════════════════════════════════════════════════════════════
   GESTION DES LABELS (zoom-dépendant)
   ════════════════════════════════════════════════════════════════════ */

function updateLabelVisibility() {
  const z = map.getZoom();

  for (const m of labelMarkers.reg) {
    if (z >= CFG.ZOOM_SHOW_REG) {
      if (!map.hasLayer(m)) m.addTo(map);
    } else {
      if (map.hasLayer(m)) map.removeLayer(m);
    }
  }
  for (const m of labelMarkers.dep) {
    if (z >= CFG.ZOOM_SHOW_DEP) {
      if (!map.hasLayer(m)) m.addTo(map);
    } else {
      if (map.hasLayer(m)) map.removeLayer(m);
    }
  }
}

/* ════════════════════════════════════════════════════════════════════
   INITIALISATION PRINCIPALE
   ════════════════════════════════════════════════════════════════════ */

async function init() {
  /* ── Initialise la carte ── */
  map = L.map('map', {
    center:           CFG.MAP_CENTER,
    zoom:             CFG.MAP_ZOOM,
    zoomControl:      true,
    attributionControl: true,
    preferCanvas:     false,
  });

  // Fond de carte léger (CartoDB Positron sans labels)
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
    attribution:
      '&copy; <a href="https://www.openstreetmap.org/copyright" target="_blank">OpenStreetMap</a> contributors' +
      ' &copy; <a href="https://carto.com/attributions" target="_blank">CARTO</a>' +
      ' | Source géo : <a href="https://geo.api.gouv.fr" target="_blank">Etalab</a>',
    subdomains: 'abcd',
    maxZoom: 19,
  }).addTo(map);

  /* ── Panes (z-order) ── */
  map.createPane('paneClpe');   map.getPane('paneClpe').style.zIndex   = 400;
  map.createPane('paneCommune');map.getPane('paneCommune').style.zIndex = 410;
  map.createPane('paneDep');    map.getPane('paneDep').style.zIndex     = 420;
  map.createPane('paneReg');    map.getPane('paneReg').style.zIndex     = 430;
  map.createPane('paneLabel');  map.getPane('paneLabel').style.zIndex   = 640;

  map.on('zoomend', updateLabelVisibility);

  /* ── Chargement des données ── */
  try {
    setLoadingStep('Chargement des données géographiques…');
    const [topo, depsGeo, regsGeo, csvText] = await Promise.all([
      fetch(CFG.TOPO_PATH).then(r => { if (!r.ok) throw new Error(`HTTP ${r.status} : ${CFG.TOPO_PATH}`); return r.json(); }),
      fetch(CFG.DEP_PATH).then(r  => { if (!r.ok) throw new Error(`HTTP ${r.status} : ${CFG.DEP_PATH}`);  return r.json(); }),
      fetch(CFG.REG_PATH).then(r  => { if (!r.ok) throw new Error(`HTTP ${r.status} : ${CFG.REG_PATH}`);  return r.json(); }),
      fetch(CFG.CSV_PATH).then(r  => { if (!r.ok) throw new Error(`HTTP ${r.status} : ${CFG.CSV_PATH}`);  return r.text(); }),
    ]);

    setLoadingStep('Lecture du fichier CSV…');
    const csvMap = parseCSV(csvText);
    if (csvMap.size === 0) throw new Error('Le CSV semble vide ou mal formaté (colonnes attendues : INSEE_COM, CLPE).');

    setLoadingStep('Construction des polygones CLPE…');
    const { features } = buildClpeFeatures(topo, csvMap);
    if (!features.length) throw new Error('Aucune correspondance entre le CSV et les communes du TopoJSON.');

    setLoadingStep('Calcul des adjacences…');
    const adj = buildAdjacency(topo, csvMap);

    setLoadingStep('Coloriage des zones…');
    const clpeNames = features.map(f => f.properties.CLPE);
    const coloring  = graphColor(clpeNames, adj, CFG.BLUE_PALETTE);

    setLoadingStep('Rendu des couches…');
    renderClpe(features, coloring);
    renderCommuneMesh(topo);
    renderDepartements(depsGeo);
    renderRegions(regsGeo);

    updateStats(features.length, csvMap.size);
    hideLoading();

    console.info(
      `✓ Carte CLPE chargée : ${features.length} CLPE, ${csvMap.size} communes, ` +
      `${CFG.BLUE_PALETTE.length} couleurs utilisées.`
    );

  } catch (err) {
    console.error('Erreur lors du chargement :', err);
    showError(
      err.message,
      'Assurez-vous que <code>topo_communes.json</code>, <code>departements.geojson</code>, ' +
      '<code>regions.geojson</code> et <code>communes_clpe.csv</code> sont présents ' +
      'à la racine du dépôt. Consultez la console pour plus de détails.'
    );
  }
}

/* ── Lancement ─────────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
