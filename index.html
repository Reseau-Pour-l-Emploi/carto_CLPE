<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Carte CLPE 2026 – Admin Express WFS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body {
    margin: 0;
    display: flex;
    height: 100vh;
    font-family: Arial, sans-serif;
}
#sidebar {
    width: 260px;
    padding: 15px;
    background: #f5f5f5;
    border-right: 1px solid #ccc;
}
#map {
    flex: 1;
}
</style>
</head>

<body>

<div id="sidebar">
    <h2>CLPE – France 2026</h2>
    <p>Données Admin Express 2026 via WFS</p>
    <p>Contours visibles :</p>
    <ul>
        <li>Régions 2026</li>
        <li>Départements 2026</li>
        <li>Communes 2026</li>
        <li>CLPE fusionnés</li>
    </ul>
</div>

<div id="map"></div>

<script>
// ------------------------------------------------------------
// 1. Carte Leaflet
// ------------------------------------------------------------
const map = L.map('map').setView([46.6, 2.5], 6);

// ------------------------------------------------------------
// 2. Fond OSM
// ------------------------------------------------------------
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 18,
    attribution: "© OpenStreetMap contributors"
}).addTo(map);

// ------------------------------------------------------------
// 3. URLs WFS Admin Express 2026
// ------------------------------------------------------------
const WFS_BASE =
  "https://datacarto.atlasante.fr/wfs?service=WFS&version=1.0.0&request=GetFeature&outputFormat=application/json&typeName=";

const URL_REGIONS = WFS_BASE + "ign_metropole_adminexpress_regions_z";
const URL_DEPTS   = WFS_BASE + "ign_metropole_adminexpress_departements_z";
const URL_COM     = WFS_BASE + "ign_metropole_adminexpress_communes_z";

// ------------------------------------------------------------
// 4. Chargement du CSV
// ------------------------------------------------------------
let csvData = null;

Papa.parse("communes_clpe.csv", {
    download: true,
    header: true,
    complete: function(results) {
        csvData = results.data;
        loadWFS();
    }
});

// ------------------------------------------------------------
// 5. Chargement WFS 2026
// ------------------------------------------------------------
async function loadWFS() {
    const [regions, depts, communes] = await Promise.all([
        fetch(URL_REGIONS).then(r => r.json()),
        fetch(URL_DEPTS).then(r => r.json()),
        fetch(URL_COM).then(r => r.json())
    ]);

    drawRegions(regions);
    drawDepartements(depts);
    drawCommunes(communes);
    aggregateCLPE(communes);
}

// ------------------------------------------------------------
// 6. Styles des couches
// ------------------------------------------------------------
function drawRegions(regions) {
    L.geoJSON(regions, {
        style: {
            color: "#002b55",
            weight: 3,
            fillOpacity: 0
        }
    }).addTo(map);
}

function drawDepartements(depts) {
    L.geoJSON(depts, {
        style: {
            color: "#0055aa",
            weight: 1.8,
            fillOpacity: 0
        }
    }).addTo(map);
}

function drawCommunes(communes) {
    L.geoJSON(communes, {
        style: {
            color: "#999",
            weight: 0.4,
            fillOpacity: 0
        }
    }).addTo(map);
}

// ------------------------------------------------------------
// 7. Fusion des communes par CLPE
// ------------------------------------------------------------
function aggregateCLPE(communesGeo) {
    const mapCLPE = {};

    csvData.forEach(row => {
        const code = row.INSEE_COM;
        const clpe = row.CLPE;

        if (!mapCLPE[clpe]) mapCLPE[clpe] = [];

        const match = communesGeo.features.find(
            f => f.properties.insee_com === code
        );

        if (match) mapCLPE[clpe].push(match);
    });

    drawCLPE(mapCLPE);
}

// ------------------------------------------------------------
// 8. Palette de bleus
// ------------------------------------------------------------
function generateBluePalette(n) {
    const colors = [];
    for (let i = 0; i < n; i++) {
        const hue = 210;
        const sat = 35 + (i * 45 / n);
        const light = 45 + (i * 35 / n);
        colors.push(`hsl(${hue}, ${sat}%, ${light}%)`);
    }
    return colors;
}

// ------------------------------------------------------------
// 9. Affichage des CLPE fusionnés
// ------------------------------------------------------------
function drawCLPE(mapCLPE) {
    const clpeNames = Object.keys(mapCLPE);
    const colors = generateBluePalette(clpeNames.length);

    clpeNames.forEach((clpe, i) => {
        const features = mapCLPE[clpe];

        const merged = {
            type: "Feature",
            properties: { CLPE: clpe },
            geometry: {
                type: "MultiPolygon",
                coordinates: features.flatMap(f =>
                    f.geometry.type === "Polygon"
                        ? [f.geometry.coordinates]
                        : f.geometry.coordinates
                )
            }
        };

        L.geoJSON(merged, {
            style: {
                color: "#001f3f",
                weight: 2,
                fillColor: colors[i],
                fillOpacity: 0.45
            },
            onEachFeature: (feat, layer) => {
                layer.bindTooltip(feat.properties.CLPE, { sticky: true });
            }
        }).addTo(map);
    });
}
</script>

</body>
</html>
