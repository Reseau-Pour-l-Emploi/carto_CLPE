<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Contours Admin Express + OSM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body {
    margin: 0;
    height: 100vh;
}
#map {
    width: 100%;
    height: 100%;
}
</style>
</head>

<body>

<div id="map"></div>

<script>
// ------------------------------------------------------------
// 1. Carte Leaflet
// ------------------------------------------------------------
const map = L.map('map').setView([46.6, 2.5], 6);

// ------------------------------------------------------------
// 2. Fond OSM
// ------------------------------------------------------------
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 18,
    attribution: "© OpenStreetMap contributors"
}).addTo(map);

// ------------------------------------------------------------
// 3. URLs Admin Express (VERSION 2024 FONCTIONNELLE)
// ------------------------------------------------------------
const URL_REGIONS = "https://data.geopf.fr/annexes/geojson/adminexpress_cog_2024/regions.geojson";
const URL_DEPTS   = "https://data.geopf.fr/annexes/geojson/adminexpress_cog_2024/departements.geojson";
const URL_COM     = "https://data.geopf.fr/annexes/geojson/adminexpress_cog_2024/communes.geojson";

// ------------------------------------------------------------
// 4. Chargement des couches
// ------------------------------------------------------------
Promise.all([
    fetch(URL_REGIONS).then(r => r.json()),
    fetch(URL_DEPTS).then(r => r.json()),
    fetch(URL_COM).then(r => r.json())
]).then(([regions, depts, communes]) => {

    // Régions
    L.geoJSON(regions, {
        style: {
            color: "#002b55",
            weight: 3,
            fillOpacity: 0
        }
    }).addTo(map);

    // Départements
    L.geoJSON(depts, {
        style: {
            color: "#0055aa",
            weight: 1.8,
            fillOpacity: 0
        }
    }).addTo(map);

    // Communes
    L.geoJSON(communes, {
        style: {
            color: "#999",
            weight: 0.4,
            fillOpacity: 0
        }
    }).addTo(map);

});
</script>

</body>
</html>
